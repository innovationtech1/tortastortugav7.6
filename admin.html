<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Tortas Tortuga</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0D0D; --surface: #1A1A1A; --surface2: #222222;
            --primary: #FF5A00; --green: #25D366; --yellow: #FFD600;
            --blue: #2196F3; --purple: #9C27B0; --red: #F44336;
            --text: #F0F0F0; --muted: #888; --border: rgba(255,255,255,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* LOGIN */
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
        .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 380px; text-align: center; }
        .login-logo { font-size: 3rem; margin-bottom: 0.5rem; }
        .login-box h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.25rem; }
        .login-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .login-input { width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 1rem; margin-bottom: 1rem; outline: none; }
        .login-input:focus { border-color: var(--primary); }
        .login-btn { width: 100%; padding: 0.9rem; background: var(--primary); border: none; border-radius: 10px; color: white; font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .login-btn:hover { opacity: 0.88; }
        .login-error { color: var(--red); font-size: 0.85rem; margin-top: 0.75rem; display: none; }

        /* DASHBOARD */
        #dashboard { display: none; }
        .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .top-bar-logo { font-size: 1.1rem; font-weight: 800; }
        .top-bar-logo span { color: var(--primary); }
        .live-badge { background: rgba(37,211,102,0.15); color: #25D366; padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem; }
        .live-dot { width: 8px; height: 8px; background: #25D366; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37,211,102, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(37,211,102, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37,211,102, 0); } }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; padding: 1.5rem; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; }
        .stat-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 2rem; font-weight: 800; margin-top: 0.25rem; }
        .stat-value.orange { color: var(--primary); } .stat-value.yellow { color: var(--yellow); } .stat-value.blue { color: var(--blue); } .stat-value.green { color: var(--green); }

        /* Filters */
        .filters-bar { padding: 0 1.5rem 1rem; display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }
        .filter-btn { padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.18s; }
        .filter-btn.active, .filter-btn:hover { background: rgba(255,90,0,0.15); border-color: var(--primary); color: var(--primary); }

        /* Table */
        .table-wrapper { padding: 0 1.5rem 2rem; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        thead tr { background: var(--surface2); }
        th { padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: top; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .order-id { font-family: monospace; color: var(--primary); font-weight: 700; font-size: 0.82rem; }
        .order-items { max-width: 280px; color: var(--muted); font-size: 0.82rem; line-height: 1.5; }
        .order-total { font-weight: 700; color: var(--green); white-space: nowrap; }

        /* Badges & Buttons */
        .status-select { padding: 0.3rem 0.6rem; border-radius: 20px; border: none; font-family: inherit; font-size: 0.78rem; font-weight: 700; cursor: pointer; outline: none; transition: 0.2s; }
        .delete-btn { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.2); border-radius: 8px; padding: 0.35rem; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .delete-btn:hover { background: rgba(244,67,54,0.25); transform: scale(1.05); }
        .status-nuevo       { background: rgba(37,211,102,0.15); color: #25D366; }
        .status-prep        { background: rgba(255,214,0,0.15);  color: #FFD600; }
        .status-listo       { background: rgba(33,150,243,0.15); color: #2196F3; }
        .status-entregado   { background: rgba(156,39,176,0.15); color: #CE93D8; }
        .status-cancelado   { background: rgba(244,67,54,0.15);  color: #EF9A9A; }

        .tipo-badge { font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 6px; display: inline-block; margin-bottom: 0.3rem; }
        .tipo-delivery { background: rgba(33,150,243,0.15); color: #90CAF9; }
        .tipo-pickup   { background: rgba(255,90,0,0.15);   color: #FFAB91; }
        
        .pay-badge { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: #333; color: #ccc; }

        .loading-row { text-align: center; padding: 3rem; color: var(--muted); }

        /* Modal POS de Caja */
        .caja-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; pointer-events: none; transition: 0.2s; }
        .caja-overlay.active { opacity: 1; pointer-events: all; }
        .caja-modal { background: var(--surface); border: 1px solid var(--primary); border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; text-align: center; transform: translateY(20px); transition: 0.3s; }
        .caja-overlay.active .caja-modal { transform: translateY(0); }
        .caja-title { font-size: 1.3rem; margin-bottom: 0.5rem; }
        .caja-total { font-size: 2.5rem; font-weight: 800; color: var(--green); margin-bottom: 1.5rem; }
        .caja-btn { width: 100%; padding: 0.9rem; margin-bottom: 0.6rem; border-radius: 10px; border: none; font-weight: 700; font-family: inherit; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-efectivo { background: #25D366; color: white; } .btn-efectivo:hover { background: #1ebd5a; }
        .btn-digital  { background: #2196F3; color: white; } .btn-digital:hover  { background: #1976d2; }
        .btn-close    { background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: 1rem; }
        
        .btn-cobrar-grid { background: rgba(244,67,54,0.15); color: #F44336; border: 1px solid rgba(244,67,54,0.3); border-radius: 8px; padding: 0.4rem 0.8rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; font-family: inherit; }
        .btn-cobrar-grid:hover { background: #F44336; color: white; }
        .pagado-badge { background: rgba(37,211,102,0.15); color: #25D366; border-radius: 8px; padding: 0.4rem 0.8rem; font-weight: 700; display: inline-flex; align-items: center; gap: 0.4rem; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">🐢</div>
        <h2>Panel Admin Vivo</h2>
        <p>Tortas Tortuga — Pedidos en Tiempo Real</p>
        <input type="password" id="password-input" class="login-input" placeholder="Contraseña">
        <button class="login-btn" id="btn-login" style="margin-bottom: 0.8rem;">Entrar al Panel</button>
        <button class="filter-btn" onclick="window.location.href='index.html'" style="width: 100%;">🏠 Volver a la Tienda</button>
        <p class="login-error" id="login-error">❌ Contraseña incorrecta</p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="top-bar">
        <div class="top-bar-logo">🐢 <span>Tortas Tortuga</span></div>
        <div class="top-bar-actions" style="display:flex; align-items:center; gap:1rem;">
            <button class="filter-btn" onclick="window.location.href='index.html'" style="border-color:var(--border);">🏠 Tienda</button>
            <div class="live-badge"><div class="live-dot"></div> En vivo</div>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Pedidos Hoy</div>
            <div class="stat-value orange" id="stat-total">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pendientes</div>
            <div class="stat-value yellow" id="stat-nuevos">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">En Cocina</div>
            <div class="stat-value blue" id="stat-prep">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Entregados</div>
            <div class="stat-value green" id="stat-entregados">0</div>
        </div>
    </div>

    <div class="filters-bar">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="Nuevo">🆕 Nuevos</button>
        <button class="filter-btn" data-filter="preparación">🧑‍🍳 En preparación</button>
        <button class="filter-btn" data-filter="Listo">✅ Listos</button>
        <button class="filter-btn" data-filter="Entregado">🎉 Entregados</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Ticket / Hora</th>
                    <th>Cliente / Contacto</th>
                    <th>Orden</th>
                    <th>Estado de Pago</th>
                    <th>Estado de Cocina</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tabla-pedidos">
                <tr class="loading-row"><td colspan="6">Conectando a Firebase...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- MODAL CAJA (COBRO) -->
<div class="caja-overlay" id="caja-modal">
    <div class="caja-modal">
        <h3 class="caja-title">Cobrar Ticket <span id="caja-ticket-id" style="color:var(--primary)"></span></h3>
        <div class="caja-total" id="caja-total-monto">$0.00</div>
        
        <button class="caja-btn btn-efectivo" onclick="procesarPago('Efectivo')">💵 Pagado en Efectivo</button>
        <button class="caja-btn btn-digital" onclick="procesarPago('Digital')">📲 Pagado con Zelle/App</button>
        <button class="caja-btn btn-close" onclick="cerrarCaja()">Cancelar</button>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const ADMIN_PASSWORD = 'tortuga2025'; // Clave de acceso
    let pedidosDB = [];
    let filtroActual = 'todos';

    // ─── LOGIN ──────────────────────────────────────────────
    document.getElementById('btn-login').addEventListener('click', () => {
        if (document.getElementById('password-input').value === ADMIN_PASSWORD) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            iniciarFirebaseEnVivo();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    });

    // ─── FIREBASE REALTIME ──────────────────────────────────
    function iniciarFirebaseEnVivo() {
        // Traer pedidos ordenados del más reciente al más antiguo
        const q = query(collection(db, 'pedidos'), orderBy('creado', 'desc'));
        
        onSnapshot(q, (snapshot) => {
            pedidosDB = [];
            snapshot.forEach(doc => {
                pedidosDB.push({ id: doc.id, ...doc.data() });
            });
            actualizarUI();
            
            // Reproducir sonido si hay un pedido "Nuevo" (opcional)
            const hayNuevos = pedidosDB.some(p => p.estado === 'Nuevo 🆕');
            if(hayNuevos) {
                // new Audio('campana.mp3').play().catch(e=>{});
            }
        });
    }

    // ─── ACTUALIZAR UI ──────────────────────────────────────
    function actualizarUI() {
        // Estadísticas
        document.getElementById('stat-total').textContent = pedidosDB.length;
        document.getElementById('stat-nuevos').textContent = pedidosDB.filter(p => p.estado?.includes('Nuevo')).length;
        document.getElementById('stat-prep').textContent = pedidosDB.filter(p => p.estado?.includes('preparación')).length;
        document.getElementById('stat-entregados').textContent = pedidosDB.filter(p => p.estado?.includes('Entregado')).length;

        // Filtrar y renderizar
        const filtrados = filtroActual === 'todos' 
            ? pedidosDB 
            : pedidosDB.filter(p => p.estado?.includes(filtroActual));
        
        renderTabla(filtrados);
    }

    // ─── FILTROS ────────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            filtroActual = e.target.getAttribute('data-filter');
            actualizarUI();
        });
    });

    // ─── RENDER TABLA ───────────────────────────────────────
    function renderTabla(pedidos) {
        const tbody = document.getElementById('tabla-pedidos');
        if (!pedidos.length) {
            tbody.innerHTML = `<tr><td colspan="6"><div class="empty-msg">No hay pedidos para mostrar.</div></td></tr>`;
            return;
        }

        tbody.innerHTML = pedidos.map(p => {
            const estadoCls = p.estado?.includes('Nuevo') ? 'status-nuevo'
                            : p.estado?.includes('preparación') ? 'status-prep'
                            : p.estado?.includes('Listo') ? 'status-listo'
                            : p.estado?.includes('Entregado') ? 'status-entregado'
                            : 'status-cancelado';
            
            const tipo = p.tipo === 'delivery' ? 'Delivery 🛵' : 'Pickup 🏪';
            const tipoCls = p.tipo === 'delivery' ? 'tipo-delivery' : 'tipo-pickup';
            
            let hora = '—';
            if (p.creado?.toDate) hora = p.creado.toDate().toLocaleTimeString('es-US', { hour: '2-digit', minute: '2-digit' });
            
            const ticketId = p.id.slice(-4).toUpperCase(); // Ticket de 4 letras/numeros
            
            // Lógica de Pago
            const isPaid = p.estadoPago === 'Pagado';
            let pagoHTML = '';
            if (isPaid) {
                pagoHTML = `<div class="pagado-badge">✅ Pagado (${p.metodoPagoReal || 'Caja'})<br><strong style="color:white">${p.total}</strong></div>`;
            } else {
                pagoHTML = `<button class="btn-cobrar-grid" onclick="abrirCaja('${p.id}', '${ticketId}', '${p.total}')">🔴 Cobrar ${p.total}</button><br><span class="pay-badge" style="margin-top:4px;display:inline-block">Pide: ${p.metodoPago || '?'}</span>`;
            }

            return `<tr>
                <td>
                    <span class="order-id" style="font-size:1.1rem;color:var(--yellow)">#${ticketId}</span><br>
                    <small style="color:var(--muted)">${hora}</small>
                </td>
                <td>
                    <strong>${p.nombre || '—'}</strong><br>
                    <span style="color:var(--muted);font-size:0.85rem">📞 ${p.telefono || 'En tienda'}</span><br>
                    <span class="tipo-badge ${tipoCls}" style="margin-top:4px">${tipo}</span>
                </td>
                <td><div class="order-items">${(p.items || '—').replace(/\n/g,'<br>')}</div></td>
                <td>${pagoHTML}</td>
                <td>
                    <select class="status-select ${estadoCls}" data-id="${p.id}" style="width:100%">
                        <option ${p.estado?.includes('Nuevo') ? 'selected' : ''}>Nuevo 🆕</option>
                        <option ${p.estado?.includes('preparación') ? 'selected' : ''}>En preparación 🧑‍🍳</option>
                        <option ${p.estado?.includes('Listo') ? 'selected' : ''}>Listo ✅</option>
                        <option ${p.estado?.includes('Entregado') ? 'selected' : ''}>Entregado 🎉</option>
                        <option ${p.estado?.includes('Cancelado') ? 'selected' : ''}>Cancelado ❌</option>
                    </select>
                </td>
                <td style="text-align:right">
                    <button class="delete-btn" data-id="${p.id}" title="Eliminar permanentemente">🗑️</button>
                </td>
            </tr>`;
        }).join('');

        // Agregar Event Listeners a los selects
        document.querySelectorAll('.status-select').forEach(select => {
            select.addEventListener('change', async (e) => {
                const id = e.target.getAttribute('data-id');
                const nuevoEstado = e.target.value;
                try {
                    await updateDoc(doc(db, 'pedidos', id), { estado: nuevoEstado });
                } catch(error) {
                    alert('Error al actualizar estado. Revisa tu conexión.');
                    console.error(error);
                }
            });
        });

        // Agregar Event Listeners a los botones de eliminar
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = e.currentTarget.getAttribute('data-id');
                if (confirm('⚠️ ¿Estás seguro de que deseas eliminar este pedido PERMANENTEMENTE? Esta acción no se puede deshacer.')) {
                    try {
                        await deleteDoc(doc(db, 'pedidos', id));
                    } catch(error) {
                        alert('Error al eliminar el pedido.');
                        console.error(error);
                    }
                }
            });
        });
    }

    // ─── LÓGICA DE COBRO (CAJA REGISTRADORA) ─────────────────
    let currentOrderId = null;

    window.abrirCaja = (id, ticket, total) => {
        currentOrderId = id;
        document.getElementById('caja-ticket-id').textContent = '#' + ticket;
        document.getElementById('caja-total-monto').textContent = total;
        document.getElementById('caja-modal').classList.add('active');
    };

    window.cerrarCaja = () => {
        document.getElementById('caja-modal').classList.remove('active');
        currentOrderId = null;
    };

    window.procesarPago = async (metodoReal) => {
        if(!currentOrderId) return;
        try {
            // Actualizar el documento en Firebase
            await updateDoc(doc(db, 'pedidos', currentOrderId), { 
                estadoPago: 'Pagado',
                metodoPagoReal: metodoReal,
                // Si estaba en 'Nuevo', pasarlo a preparación automáticamente al pagar
                estado: 'En preparación 🧑‍🍳' 
            });
            cerrarCaja();
        } catch(e) {
            alert('Error procesando el cobro en la base de datos.');
            console.error(e);
        }
    };
</script>
</body>
</html>
